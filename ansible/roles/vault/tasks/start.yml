- name: Start vault container using docker compose v2
  community.docker.docker_compose_v2:
    project_src: /opt/vault
    state: present
    pull: always
  become: yes

- name: Wait for vault to be ready
  uri:
    url: "{{ vault_api_addr }}/v1/sys/health"
    method: GET
    validate_certs: no
    status_code: [200, 429, 501, 503]
  register: vault_health_check
  until: vault_health_check.status in [200, 429, 501, 503]
  retries: 10
  delay: 10
